<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - Jardines del Renacer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tipografía estilo Apple */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Fondo Líquido / Mesh Gradient Azul */
        .bg-liquid {
            background-color: #003366;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,50%,0.8) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(200,100%,30%,0.9) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(220,100%,40%,0.7) 0, transparent 50%),
                radial-gradient(at 50% 100%, hsla(210,100%,20%,1) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
        }

        /* Glassmorphism Card (iOS Style) */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .logo-container {
            background: linear-gradient(145deg, rgba(7, 58, 120, 0.95), rgba(13, 90, 164, 0.9));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 16px 34px rgba(0, 35, 82, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }
        .logo-container img {
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.22));
        }

        /* Input de Cristal */
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0056b3;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.15), inset 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Botón de Cristal Azul */
        .glass-btn {
            background: rgba(0, 64, 128, 0.85);
            color: white;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 43, 94, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass-btn:hover {
            background: rgba(0, 43, 94, 0.95);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 43, 94, 0.4);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .blob-1 { position: absolute; width: 350px; height: 350px; background: rgba(0, 102, 255, 0.4); border-radius: 50%; filter: blur(90px); top: -50px; left: -100px; z-index: 0; }
        .blob-2 { position: absolute; width: 450px; height: 450px; background: rgba(0, 204, 255, 0.3); border-radius: 50%; filter: blur(120px); bottom: -100px; right: -150px; z-index: 0; }

        @media (max-width: 640px) {
            .glass-card {
                width: min(100%, 24rem);
                padding: 1.35rem !important;
                border-radius: 1.35rem !important;
            }
            .logo-container {
                padding: 0.85rem !important;
                border-radius: 1rem !important;
            }
            .logo-container img {
                height: 3rem !important;
                max-width: 11rem;
            }
            h1 {
                font-size: 1.35rem !important;
                line-height: 1.2 !important;
            }
            .glass-input,
            .glass-btn {
                font-size: 1rem !important;
                padding-top: 0.82rem !important;
                padding-bottom: 0.82rem !important;
            }
            #codigo {
                font-size: 1.85rem !important;
                letter-spacing: 0.35em !important;
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }
            .blob-1 {
                width: 240px;
                height: 240px;
            }
            .blob-2 {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body class="bg-liquid min-h-screen relative">

    <div class="blob-1 pointer-events-none"></div>
    <div class="blob-2 pointer-events-none"></div>

    <main class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="glass-card w-full max-w-md rounded-[2rem] p-8 relative z-10">
        <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-white/40 to-transparent rounded-t-[2rem] pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="logo-container p-4 rounded-2xl inline-block mb-4">
                <img src="/logo-oficial.webp" alt="Logo Jardines del Renacer" class="h-14 mx-auto object-contain drop-shadow-sm" onerror="this.src='/logo-oficial.webp'">
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Acceso Administrativo</h1>
            <p class="text-gray-500 mt-2 text-xs font-semibold uppercase tracking-wider">Acceso Restringido</p>
        </div>

        <div id="errorContainer" class="hidden mb-6 bg-red-50/80 backdrop-blur-md border border-red-200 p-4 rounded-xl shadow-sm relative z-10">
            <p id="errorText" class="text-sm font-medium text-red-800 text-center"></p>
        </div>
        
        <div id="successContainer" class="hidden mb-6 bg-green-50/80 backdrop-blur-md border border-green-200 p-4 rounded-xl shadow-sm relative z-10">
            <p id="successText" class="text-sm font-medium text-green-800 text-center"></p>
        </div>

        <!-- Paso 1: Credenciales -->
        <form id="loginForm1" class="space-y-5 relative z-10">
            <div>
                <label for="email" class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Correo Electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                    class="glass-input block w-full px-5 py-3.5 rounded-xl text-base font-semibold text-gray-800"
                    placeholder="admin@jardinesdelrenacer.co">
            </div>
            <div>
                <label for="password" class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    class="glass-input block w-full px-5 py-3.5 rounded-xl text-base font-semibold text-gray-800">
            </div>
            <button type="submit" id="btnPaso1"
                class="glass-btn w-full flex justify-center items-center py-3.5 px-4 rounded-xl text-lg font-semibold mt-6">
                <span id="textPaso1">Continuar</span>
                <span id="loaderPaso1" class="loader hidden ml-3"></span>
            </button>
        </form>

        <!-- Paso 2: Código 2FA -->
        <form id="loginForm2" class="space-y-5 hidden relative z-10">
            <div class="text-center mb-6">
                <div class="bg-white/40 p-4 rounded-xl border border-white/50 backdrop-blur-sm">
                    <p class="text-sm font-medium text-gray-700">Se ha enviado un código de 6 dígitos a su correo electrónico.</p>
                </div>
            </div>
            <div>
                <label for="codigo" class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1 text-center">Código de Verificación</label>
                <input type="text" id="codigo" name="codigo" required maxlength="6" pattern="\d{6}" autocomplete="one-time-code"
                    class="glass-input block w-full px-5 py-4 rounded-xl text-center text-3xl font-bold tracking-[0.5em] text-gray-800"
                    placeholder="000000">
            </div>
            <button type="submit" id="btnPaso2"
                class="glass-btn w-full flex justify-center items-center py-3.5 px-4 rounded-xl text-lg font-semibold mt-6">
                <span id="textPaso2">Verificar Código</span>
                <span id="loaderPaso2" class="loader hidden ml-3"></span>
            </button>
            <div class="text-center mt-4">
                <button type="button" id="btnVolver" class="text-xs font-bold text-gray-500 uppercase tracking-wider hover:text-gray-800 transition-colors">Volver e intentar de nuevo</button>
            </div>
        </form>
    </div>
    </main>

    <div data-jardines-footer></div>
    <script src="/jardines-footer.js" defer></script>

    <script>
        let currentAdminId = null;

        const showError = (msg) => {
            const container = document.getElementById('errorContainer');
            document.getElementById('errorText').textContent = msg;
            container.classList.remove('hidden');
            document.getElementById('successContainer').classList.add('hidden');
        };

        const showSuccess = (msg) => {
            const container = document.getElementById('successContainer');
            document.getElementById('successText').textContent = msg;
            container.classList.remove('hidden');
            document.getElementById('errorContainer').classList.add('hidden');
        };

        const clearMessages = () => {
            document.getElementById('errorContainer').classList.add('hidden');
            document.getElementById('successContainer').classList.add('hidden');
        };

        document.getElementById('loginForm1').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('btnPaso1');
            const text = document.getElementById('textPaso1');
            const loader = document.getElementById('loaderPaso1');

            btn.disabled = true;
            text.textContent = 'Verificando...';
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, accion: 'login_paso1' })
                });
                
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    throw new Error('Vercel devolvió un error interno grave. Ve a la pestaña "Logs" en Vercel para ver qué se rompió.');
                }

                if (response.ok && data.success) {
                    currentAdminId = data.adminId;
                    showSuccess(data.message || 'Código enviado a tu correo.');
                    document.getElementById('loginForm1').classList.add('hidden');
                    document.getElementById('loginForm2').classList.remove('hidden');
                } else {
                    showError(data.error || data.message || 'Error en las credenciales.');
                }
            } catch (err) {
                showError(err.message || 'Error de conexión con el servidor.');
            } finally {
                btn.disabled = false;
                text.textContent = 'Continuar';
                loader.classList.add('hidden');
            }
        });

        document.getElementById('loginForm2').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            const codigo = document.getElementById('codigo').value.trim();
            
            const btn = document.getElementById('btnPaso2');
            const text = document.getElementById('textPaso2');
            const loader = document.getElementById('loaderPaso2');

            btn.disabled = true;
            text.textContent = 'Validando...';
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId: currentAdminId, codigo, accion: 'login_paso2' })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.admin));
                    window.location.href = '/admin/index.html';
                } else {
                    showError(data.error || data.message || 'Código incorrecto o expirado.');
                }
            } catch (err) {
                showError('Error de conexión con el servidor.');
            } finally {
                btn.disabled = false;
                text.textContent = 'Verificar Código';
                loader.classList.add('hidden');
            }
        });

        document.getElementById('btnVolver').addEventListener('click', () => {
            clearMessages();
            document.getElementById('loginForm2').classList.add('hidden');
            document.getElementById('loginForm1').classList.remove('hidden');
            document.getElementById('password').value = '';
            document.getElementById('codigo').value = '';
            currentAdminId = null;
        });
    </script>
</body>
</html>
